name: Release

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: Build macOS (amd64, arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build Binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=1 GOOS=darwin GOARCH="${arch}" \
              go build -trimpath -ldflags "-s -w -X github.com/sjzar/chatlog/pkg/version.Version=${GITHUB_REF_NAME}" \
              -o "dist/chatlog-darwin-${arch}" .
          done

      - name: Package Archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          short_sha="${GITHUB_SHA::7}"
          for arch in amd64 arm64; do
            archive="release/chatlog_${short_sha}_darwin_${arch}.zip"
            /usr/bin/zip -j "${archive}" "dist/chatlog-darwin-${arch}" LICENSE README.md
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: |
            dist/chatlog-darwin-*
            release/*.zip

  build-windows:
    name: Build Windows (amd64, arm64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup MSYS2 (for CGO amd64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Build Binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $gccCmd = Get-Command gcc -ErrorAction SilentlyContinue
          if (-not $gccCmd) {
            throw "gcc not found in PATH after setup-msys2"
          }
          Write-Host "Using gcc:" $gccCmd.Source

          $env:CC = "gcc"
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "-s -w -X github.com/sjzar/chatlog/pkg/version.Version=$env:GITHUB_REF_NAME" -o "dist/chatlog-windows-amd64.exe" .

          # windows/arm64 在 CI 中使用非 cgo 构建，语音转 MP3 依赖 cgo，运行时会走提示性兜底。
          Remove-Item Env:CC -ErrorAction SilentlyContinue
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "arm64"
          go build -trimpath -ldflags "-s -w -X github.com/sjzar/chatlog/pkg/version.Version=$env:GITHUB_REF_NAME" -o "dist/chatlog-windows-arm64.exe" .

      - name: Package Archives
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          Compress-Archive -Path dist/chatlog-windows-amd64.exe,LICENSE,README.md -DestinationPath "release/chatlog_${shortSha}_windows_amd64.zip" -Force
          Compress-Archive -Path dist/chatlog-windows-arm64.exe,LICENSE,README.md -DestinationPath "release/chatlog_${shortSha}_windows_arm64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: |
            dist/chatlog-windows-*.exe
            release/*.zip

  publish:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Collect Files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p publish
          find release-assets -type f \( -name "*.zip" -o -name "*.exe" -o -name "chatlog-darwin-*" \) -exec cp {} publish/ \;
          ls -lah publish

      - name: Publish Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Auto build for `${{ github.sha }}` from `${{ github.ref_name }}`."
          prerelease: true
          make_latest: false
          files: publish/*
